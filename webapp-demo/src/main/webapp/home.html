<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录结果</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<main class="page">
    <section class="card">
        <div class="brand">登录成功页面</div>
        <h1>欢迎，<span id="username">加载中</span></h1>
        <p class="hint">登录用户由后端 Servlet 写入 Session，并在本页面通过 jQuery 请求接口显示。</p>

        <div class="info-list">
            <div>
                <span>用户 ID</span>
                <strong id="userId">-</strong>
            </div>
            <div>
                <span>用户名</span>
                <strong id="userNameText">-</strong>
            </div>
            <div>
                <span>角色</span>
                <strong id="role">-</strong>
            </div>
        </div>

        <button id="logoutButton" type="button" class="secondary">退出登录</button>
    </section>
</main>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/home.js"></script>
</body>
</html>
