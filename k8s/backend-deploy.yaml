apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: mall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: registry.local/mall/backend:latest
          ports:
            - containerPort: 8080
          env:
            # 限制JVM堆大小，避免在小内存节点上把容器内存限额吃满被OOMKilled
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms128m -Xmx384m -XX:MaxMetaspaceSize=128m"
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "150m"
              memory: "384Mi"
            limits:
              cpu: "500m"
              memory: "640Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: mall
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
